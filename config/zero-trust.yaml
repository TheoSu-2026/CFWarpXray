# Zero Trust 配置示例
enabled: true
organization: ""
auth_client_id: ""
auth_client_secret: ""

# WARP 运行模式：
# - "proxy": 代理模式（推荐），WARP 提供本地 SOCKS5 代理，Xray 通过代理出站
# - "warp" 或其他: TUN 全局模式，WARP 接管系统默认路由，Xray 直连出站
service_mode: "proxy"

# 代理模式下的本地代理端口（service_mode 为 "proxy" 时生效）
proxy_port: 40000

# 自动连接（1=启用，0=禁用）
auto_connect: 1
