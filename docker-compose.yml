services:
  cfwarpxray:
    build: .
    image: cfwarpxray
    container_name: cfwarpxray
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - MKNOD
    device_cgroup_rules:
      - "c 10:200 rwm"
    # 如需覆盖镜像内 Zero Trust 配置，取消下面注释并改成本机实际路径。
    # volumes:
    #   - ./config/zero-trust.yaml:/etc/cfwarpxray/zero-trust.yaml:ro
